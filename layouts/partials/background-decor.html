    <!-- Tail -->
    <path d="M165,125 Q190,115 185,140 Q195,150 180,160 Q170,150 165,140" fill="url(#maneGrad)"/>
    <!-- Eye -->
    <circle cx="55" cy="100" r="3" fill="#1f2937"/>

      <circle cx="55" cy="100" r="3" fill="#1f2937"/>
